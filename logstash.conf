# =============================================================
# logstash.conf — Movies Data Platform
# Flux : movies.csv → movies_raw (brut) + movies_clean (nettoyé)
# =============================================================

input {
  file {
    path          => "/data/movies.csv"
    start_position => "beginning"
    sincedb_path  => "/dev/null"        # relire à chaque démarrage
    codec         => plain { charset => "UTF-8" }
  }
}

# ─────────────────────────────────────────────────────────────
# FILTER — parse + nettoyage
# ─────────────────────────────────────────────────────────────
filter {

  # ── 1. Parser le CSV ──────────────────────────────────────
  csv {
    separator   => ","
    quote_char  => '"'
    skip_header => true
    columns     => [
      "id", "title", "genres", "original_language",
      "overview", "popularity", "production_companies",
      "release_date", "budget", "revenue", "runtime",
      "status", "tagline", "vote_average", "vote_count",
      "credits", "keywords", "poster_path", "backdrop_path",
      "recommendations"
    ]
  }

  # ── 2. Supprimer les lignes vides / header résiduel ────────
  if [id] == "id" or ![id] {
    drop { }
  }

  # ── 3. Conversions de types numériques ────────────────────
  mutate {
    convert => {
      "id"           => "integer"
      "popularity"   => "float"
      "budget"       => "float"
      "revenue"      => "float"
      "runtime"      => "float"
      "vote_average" => "float"
      "vote_count"   => "integer"
    }
  }

  # ── 4. Parsing de la date de sortie ───────────────────────
  date {
    match        => ["release_date", "yyyy-MM-dd"]
    target       => "release_date"
    timezone     => "UTC"
    tag_on_failure => ["_date_parse_failure"]
  }

  # ── 5. Normalisation des champs liste (séparateur "-") ────
  # genres : "Action-Adventure-Fantasy" → ["Action","Adventure","Fantasy"]
  mutate {
    split => {
      "genres"               => "-"
      "keywords"             => "-"
      "credits"              => "-"
      "production_companies" => "-"
      "recommendations"      => "-"
    }
  }

  # ── 6. Nettoyage des valeurs nulles / vides ───────────────
  # budget / revenue à 0 → null (non renseigné)
  if [budget] == 0 {
    mutate { replace => { "budget" => nil } }
  }
  if [revenue] == 0 {
    mutate { replace => { "revenue" => nil } }
  }
  # runtime à 0 → null
  if [runtime] == 0 {
    mutate { replace => { "runtime" => nil } }
  }

  # Supprimer les champs vides string
  if [tagline] == "" {
    mutate { remove_field => ["tagline"] }
  }
  if [overview] == "" {
    mutate { remove_field => ["overview"] }
  }
  if [backdrop_path] == "" {
    mutate { remove_field => ["backdrop_path"] }
  }

  # ── 7. Champ calculé : profit ─────────────────────────────
  if [budget] and [revenue] and [budget] > 0 {
    ruby {
      code => "
        budget  = event.get('budget').to_f
        revenue = event.get('revenue').to_f
        event.set('profit', revenue - budget)
        event.set('roi_pct', ((revenue - budget) / budget * 100).round(2))
      "
    }
  }

  # ── 8. Extraction de l'année de sortie (champ dédié) ──────
  ruby {
    code => "
      rd = event.get('release_date')
      if rd.is_a?(LogStash::Timestamp)
        event.set('release_year', rd.year)
      end
    "
  }

  # ── 9. Marquer si film avec données financières complètes ─
  ruby {
    code => "
      has_budget  = event.get('budget').to_f  > 0
      has_revenue = event.get('revenue').to_f > 0
      event.set('has_financials', has_budget && has_revenue)
    "
  }

  # ── 10. Supprimer les métadonnées Logstash ────────────────
  mutate {
    remove_field => ["@version", "host", "log", "event", "message"]
  }

  # ── 11. Cloner l'événement : un pour raw, un pour clean ───
  clone {
    clones => ["movies_clean"]
  }

  # L'événement original → movies_raw (brut, on remet les listes en string)
  # Le clone → movies_clean (on garde les tableaux et les champs calculés)
  if [type] != "movies_clean" {
    mutate {
      add_field => { "[@metadata][target_index]" => "movies_raw" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][target_index]" => "movies_clean" }
    }
  }
}

# ─────────────────────────────────────────────────────────────
# OUTPUT
# ─────────────────────────────────────────────────────────────
output {

  # ── Index dynamique selon le tag ──────────────────────────
  if [@metadata][target_index] == "movies_raw" {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "movies_raw"
      document_id => "%{id}"
      action    => "index"
    }
  }

  if [@metadata][target_index] == "movies_clean" {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "movies_clean"
      document_id => "%{id}"
      action    => "index"
    }
  }

  # ── Debug (à désactiver en prod) ──────────────────────────
  # stdout { codec => rubydebug }
}