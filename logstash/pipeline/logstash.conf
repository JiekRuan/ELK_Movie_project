# logstash.conf - pipeline d'ingestion des films TMDB
# Flux : movies.csv -> movies_raw (brut) + movies_clean (nettoyé)

input {
  file {
    path           => "/data/movies.csv"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    codec          => plain { charset => "UTF-8" }
  }
}

# FILTER - parsing CSV et nettoyage des données
filter {

  # 1. on parse le CSV avec les noms de colonnes du fichier source
  csv {
    separator   => ","
    quote_char  => '"'
    skip_header => true
    columns     => [
      "id", "title", "genres", "original_language",
      "overview", "popularity", "production_companies",
      "release_date", "budget", "revenue", "runtime",
      "status", "tagline", "vote_average", "vote_count",
      "credits", "keywords", "poster_path", "backdrop_path",
      "recommendations"
    ]
  }

  # 2. on vire les lignes vides ou le header s'il passe quand même
  if [id] == "id" or ![id] {
    drop { }
  }

  # 3. conversion des types - budget et revenue en long pour les grands nombres
  mutate {
    convert => {
      "id"           => "integer"
      "popularity"   => "float"
      "budget"       => "long"
      "revenue"      => "long"
      "runtime"      => "float"
      "vote_average" => "float"
      "vote_count"   => "integer"
    }
  }

  # 4. on parse la date de sortie - les échecs sont tagués pour suivi
  date {
    match          => ["release_date", "yyyy-MM-dd"]
    target         => "release_date"
    timezone       => "UTC"
    tag_on_failure => ["_date_parse_failure"]
  }

  # 5. les genres/crédits/keywords arrivent comme "Action-Comedy-Drama"
  # on split sur "-" pour avoir des tableaux propres
  mutate {
    split => {
      "genres"               => "-"
      "keywords"             => "-"
      "credits"              => "-"
      "production_companies" => "-"
      "recommendations"      => "-"
    }
  }

  # 6. budget et revenue à 0 = donnée absente, pas vraiment 0 euros
  if [budget] == 0 {
    mutate { replace => { "budget" => nil } }
  }
  if [revenue] == 0 {
    mutate { replace => { "revenue" => nil } }
  }
  if [runtime] == 0 {
    mutate { replace => { "runtime" => nil } }
  }

  # champs texte vides -> on les supprime plutôt que de garder une string vide
  if [tagline] == "" {
    mutate { remove_field => ["tagline"] }
  }
  if [overview] == "" {
    mutate { remove_field => ["overview"] }
  }
  if [backdrop_path] == "" {
    mutate { remove_field => ["backdrop_path"] }
  }

  # 7. calcul du profit et du ROI si on a les deux données financières
  if [budget] and [revenue] and [budget] > 0 {
    ruby {
      code => "
        budget  = event.get('budget').to_f
        revenue = event.get('revenue').to_f
        event.set('profit', (revenue - budget).to_i)
        event.set('roi_pct', ((revenue - budget) / budget * 100).round(2))
      "
    }
  }

  # 8. on extrait l'année depuis la date pour faciliter les agrégations
  ruby {
    code => "
      rd = event.get('release_date')
      if rd.is_a?(LogStash::Timestamp)
        event.set('release_year', rd.year)
      end
    "
  }

  # 9. booléen pratique pour filtrer les films avec données financières complètes
  ruby {
    code => "
      has_budget  = event.get('budget').to_f  > 0
      has_revenue = event.get('revenue').to_f > 0
      event.set('has_financials', has_budget && has_revenue)
    "
  }

  # 10. on nettoie les champs internes ajoutés par Logstash
  mutate {
    remove_field => ["@version", "host", "log", "event", "message"]
  }

  # 11. on clone l'event : un part dans movies_raw (brut), l'autre dans movies_clean
  clone {
    clones => ["movies_clean"]
  }

  if [type] != "movies_clean" {
    mutate {
      add_field => { "[@metadata][target_index]" => "movies_raw" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][target_index]" => "movies_clean" }
    }
  }
}

# OUTPUT - on envoie dans les bons index
output {

  if [@metadata][target_index] == "movies_raw" {
    elasticsearch {
      hosts       => ["http://elasticsearch:9200"]
      index       => "movies_raw"
      document_id => "%{id}"
      action      => "index"
    }
  }

  if [@metadata][target_index] == "movies_clean" {
    elasticsearch {
      hosts       => ["http://elasticsearch:9200"]
      index       => "movies_clean"
      document_id => "%{id}"
      action      => "index"
    }
  }

  # décommenter pour debug si besoin
  # stdout { codec => rubydebug }
}
