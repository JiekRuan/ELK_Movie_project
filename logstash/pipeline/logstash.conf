# logstash.conf - pipeline d'ingestion des films TMDB
# Flux : movies.csv -> movies_raw (brut) + movies_clean (nettoyé)
# Dataset : 10 000 films, 8 colonnes, dates au format dd-MM-yyyy

input {
  file {
    path           => "/data/movies.csv"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    codec          => plain { charset => "UTF-8" }
  }
}

filter {

  # 1. parse le CSV - les colonnes correspondent exactement à celles du fichier TMDB
  csv {
    separator   => ","
    quote_char  => '"'
    skip_header => true
    columns     => [
      "movie_id", "title", "original_language",
      "release_date", "popularity", "vote_average",
      "vote_count", "overview"
    ]
  }

  # 2. on vire les lignes vides ou les résidus du header
  if [movie_id] == "index" or ![movie_id] {
    drop { }
  }

  # 3. conversion des types numériques
  mutate {
    convert => {
      "movie_id"     => "integer"
      "popularity"   => "float"
      "vote_average" => "float"
      "vote_count"   => "integer"
    }
  }

  # 4. parse la date - format dd-MM-yyyy dans ce dataset
  date {
    match          => ["release_date", "dd-MM-yyyy"]
    target         => "release_date"
    timezone       => "UTC"
    tag_on_failure => ["_date_parse_failure"]
  }

  # 5. extraction de l'année pour faciliter les agrégations par année
  ruby {
    code => "
      rd = event.get('release_date')
      if rd.is_a?(LogStash::Timestamp)
        event.set('release_year', rd.year)
      end
    "
  }

  # 6. on supprime les overviews vides plutôt que de garder une string vide
  if [overview] == "" {
    mutate { remove_field => ["overview"] }
  }

  # 7. on nettoie les champs internes de Logstash qu'on veut pas dans ES
  mutate {
    remove_field => ["@version", "host", "log", "event", "message"]
  }
}

# on envoie dans les deux index en même temps
# movies_raw reçoit tout avec un mapping dynamique
# movies_clean utilise le mapping explicite qu'on a appliqué avant de lancer
output {

  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "movies_raw"
    document_id => "%{movie_id}"
    action      => "index"
  }

  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "movies_clean"
    document_id => "%{movie_id}"
    action      => "index"
  }

  # décommenter pour debug si besoin
  # stdout { codec => rubydebug }
}
